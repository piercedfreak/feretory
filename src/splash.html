<!DOCTYPE html>
<html>
<head>
<style>
body{
margin:0;
background:#0f0f14;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
flex-direction:column;
}
img{
width:128px;
height:128px;
margin-bottom:20px;
}
h1{
margin:0;
color:#7c5cff;
font-size:42px;
text-transform:lowercase;
}
p{
opacity:.7;
margin-top:10px;
}
.loader{
margin-top:20px;
width:180px;
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
}
.fill{
height:100%;
width:0%;
background:#7c5cff;
animation:load 2s linear forwards;
}
@keyframes load{
from{width:0%;}
to{width:100%;}
}
</style>
</head>
<body>

<img src="assets/splash.png">
<h1>feretory</h1>
<p>Launching Reward Hunter...</p>

<div class="loader">
<div class="fill"></div>
</div>

</body>
</html>
